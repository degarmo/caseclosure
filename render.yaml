# render.yaml — CaseClosure full-stack deployment
# Backend: Django REST API  |  Frontend: React (Vite) static site

databases:
  - name: caseclosure-db
    plan: free
    databaseName: caseclosure_db
    user: caseclosure_user

services:
  # ── Backend: Django API ──────────────────────────────────
  - type: web
    name: caseclosure-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: caseclosure-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SITE_URL
        value: https://caseclosure.org
      - key: ALLOWED_HOSTS
        value: ".caseclosure.org,caseclosure.org,www.caseclosure.org,caseclosure-backend.onrender.com"
      # Superuser — set password manually in Render dashboard
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@caseclosure.org
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      # Celery synchronous mode (no Redis worker needed on free tier)
      - key: CELERY_ALWAYS_EAGER
        value: "True"
      # Email — set these manually in Render dashboard
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      # Cloudinary — set these manually in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── Frontend: React SPA ──────────────────────────────────
  - type: web
    name: caseclosure-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      # SPA catch-all: serve index.html for all routes (React Router handles them)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        value: https://caseclosure-backend.onrender.com/api/

