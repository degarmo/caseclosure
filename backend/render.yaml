# render.yaml
databases:
  - name: caseclosure-db
    plan: free
    databaseName: caseclosure_db
    user: caseclosure_user

services:
  # Main Django web service
  - type: web
    name: caseclosure
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: caseclosure-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SITE_URL
        value: https://caseclosure.org
      - key: ALLOWED_HOSTS
        value: .caseclosure.org,caseclosure.org,www.caseclosure.org,caseclosure.onrender.com
      # Superuser credentials for initial deploy
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@caseclosure.org
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false  # Must be set manually in Render dashboard
      # Celery runs synchronously without a dedicated worker
      - key: CELERY_ALWAYS_EAGER
        value: "True"
      # Email config - set these in Render dashboard
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

